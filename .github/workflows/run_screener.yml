name: Daily Options Scan

on:
  schedule:
    # Runs at 20:30 UTC (approx. 30 mins after market close)
    - cron: '30 20 * * 1-5'
  workflow_dispatch:      # Allows you to click "Run Workflow" manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy scipy

      - name: Run Screener
        env:
          # Ensure these match your GitHub Repo Secrets exactly
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python bull_put_screener.py
